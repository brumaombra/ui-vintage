name: Publish npm package

on:
  # Publish when a version tag is pushed, for example v0.1.3
  push:
    tags:
      - 'v*'

# Grant the permissions needed to mint an OIDC token for npm trusted publishing and create a GitHub Release from the pushed version tag
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      # Install dependencies so the package is published from a clean environment
      - name: Install dependencies
        run: npm ci

      # Ensure the pushed tag matches the version declared in package.json
      - name: Validate tag version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      # Validate types before building the published package
      - name: Type-check package
        run: npm run typecheck

      # Build the dist output that npm will publish
      - name: Build package
        run: npm run build

      # Publish to npm through trusted publishing using the GitHub OIDC identity
      - name: Publish to npm
        run: npm publish --access public --provenance

      # Create a GitHub Release for the same tag with generated release notes
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true